# w-lighter MODEL 서버 — 로컬/배포 오케스트레이션.
# 실행: docker compose up --build   → http://localhost:8000/docs , /health
#
# 시크릿은 이미지에 굽지 않고 런타임 주입: env_file=model_server/.env (gitignore됨, SoT는 .env.example).
# stage 1(현재): app 단독으로 부팅·/health 검증 가능. qdrant/볼륨은 이후 단계(라이브 번역)용.

services:
  app:
    build:
      context: ./model_server          # Dockerfile·.dockerignore 위치
    image: wlighter-model-server:latest
    env_file:
      - ./model_server/.env            # 실키/설정 런타임 주입(이미지에 미포함)
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/cache/huggingface    # KURE 임베딩 모델 캐시(재다운로드 방지) — stage 2
      # rdb+SQLite 영속화 쓸 때 DB 파일 보존(주석 해제 + .env에 CONTENT_STORE_BACKEND=rdb):
      # - db_data:/app/var
    # 배포 권장 토글(주석 해제 시 .env보다 우선). 코드 기본값은 False라 bare uvicorn/CI는 빠른 부팅,
    # 도커로 띄울 때만(=이 레시피) warm-up ON → 배포 콜드스타트 방지. (compose는 docker compose 실행 때만 읽힘)
    # stage 2 검증 완료(2026-06-20): 1차 기동 시 KURE가 hf_cache 볼륨에 적재(2.1G),
    # HF_HUB_OFFLINE=1 재기동에도 warm-up 성공(~1.8s, 재다운로드 0) → 캐시 재사용 증명.
    environment:
      - WARMUP_ON_STARTUP=1            # 첫 요청 콜드스타트 방지(KURE 사전 적재) — 도커 실행에만 적용
      - QDRANT_URL=http://qdrant:6333  # self-host qdrant 컨테이너(서버 모드 url=). 비면 임베디드 path= 폴백
    restart: unless-stopped
    depends_on:
      - qdrant                          # 시작 순서만 보장(app은 qdrant 없이도 부팅됨)

  # 라이브 번역 RAG용 벡터 DB. app은 내부 네트워크로 http://qdrant:6333 접근(서비스명=DNS).
  qdrant:
    image: qdrant/qdrant:latest
    # 포트 미공개(보안 기본): qdrant는 compose 내부망 전용 → app 컨테이너만 접근, 외부·호스트 차단.
    # 시드는 호스트가 아니라 컨테이너 안에서: docker compose run --rm app python scripts/seed_kculture_from_json.py
    # 로컬 디버깅으로 호스트에서 직접 보고 싶을 때만 아래 주석 해제(외부 노출 주의).
    # ports:
    #   - "127.0.0.1:6333:6333"          # localhost 전용(외부 비공개). REST/gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  hf_cache:
  qdrant_data:
  # db_data:
