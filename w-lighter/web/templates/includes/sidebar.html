{# 사이드바 열림/닫힘 상태 복원 — 마크업 직후 동기 실행이라 깜빡임 없음 #}
<script>
  (function () {
    try {
      var v = localStorage.getItem('wlighter:sidebarOpen');
      if (v === null) return;            /* 저장값 없으면 템플릿 기본값(열림) 유지 */
      var sb = document.getElementById('sidebar');
      var open = v === '1';
      if (sb) sb.classList.toggle('open', open);
      document.body.classList.toggle('sidebar-open', open);
    } catch (e) {}
  })();
</script>
